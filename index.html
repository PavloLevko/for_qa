<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QA Form Elements Handbook</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 40px 20px;
            color: #333;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: white;
            border-radius: 16px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
            overflow: hidden;
        }

        header {
            background: linear-gradient(135deg, #4c51bf, #6b46c0);
            color: white;
            padding: 40px 30px;
            text-align: center;
        }

        h1 {
            font-size: 2.8rem;
            margin-bottom: 10px;
        }

        .subtitle {
            font-size: 1.3rem;
            opacity: 0.95;
            font-weight: 400;
        }

        .main-content {
            padding: 40px;
        }

        .section {
            background: #f8fafc;
            border-radius: 12px;
            padding: 25px;
            margin-bottom: 30px;
            border: 1px solid #e2e8f0;
        }

        .section h2 {
            color: #4c51bf;
            margin-bottom: 20px;
            font-size: 1.5rem;
            border-bottom: 2px solid #e2e8f0;
            padding-bottom: 10px;
        }

        label {
            display: block;
            margin: 12px 0 6px;
            font-weight: 600;
            color: #2d3748;
        }

        input[type="text"], 
        input[type="password"], 
        input[type="email"], 
        input[type="number"], 
        input[type="date"], 
        input[type="color"], 
        input[type="file"],
        select,
        textarea {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #cbd5e0;
            border-radius: 8px;
            font-size: 1rem;
            transition: all 0.3s;
        }

        input:focus, select:focus, textarea:focus {
            border-color: #4c51bf;
            box-shadow: 0 0 0 3px rgba(76, 81, 191, 0.15);
            outline: none;
        }

        button {
            padding: 12px 24px;
            margin: 8px 8px 8px 0;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        button:hover {
            transform: translateY(-2px);
        }

        .btn-primary {
            background: #4c51bf;
            color: white;
        }

        .btn-success {
            background: #38a169;
            color: white;
        }

        .btn-danger {
            background: #e53e3e;
            color: white;
        }

        .radio-group, .checkbox-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: 10px;
        }

        .option {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .footer {
            text-align: center;
            padding: 25px;
            background: #f1f5f9;
            color: #64748b;
            font-size: 0.95rem;
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>QA Form Elements</h1>
            <p class="subtitle">Повний набір HTML елементів форм для тестувальників</p>
        </header>

        <div class="main-content">

            <div class="section">
                <h2>1. Текстові поля</h2>
                <label for="text">Text Input:</label>
                <input type="text" id="text" placeholder="Звичайне текстове поле">

                <label for="email">Email Input:</label>
                <input type="email" id="email" placeholder="your@email.com">

                <label for="password">Password Input:</label>
                <input type="password" id="password" placeholder="••••••••">
            </div>

            <div class="section">
                <h2>2. Checkbox</h2>
                <div class="checkbox-group">
                    <label class="option"><input type="checkbox"> Accept Terms and Conditions</label>
                    <label class="option"><input type="checkbox" checked> Subscribe to newsletter</label>
                    <label class="option"><input type="checkbox"> Receive promotional emails</label>
                </div>
            </div>

            <div class="section">
                <h2>3. Radio Buttons</h2>
                <div class="radio-group">
                    <label class="option"><input type="radio" name="gender" value="male"> Male</label>
                    <label class="option"><input type="radio" name="gender" value="female"> Female</label>
                    <label class="option"><input type="radio" name="gender" value="other"> Prefer not to say</label>
                </div>
            </div>

            <div class="section">
                <h2>4. Select (Dropdown)</h2>
                <label for="country">Country:</label>
                <select id="country">
                    <option value="">-- Select country --</option>
                    <option value="ua">Ukraine</option>
                    <option value="pl">Poland</option>
                    <option value="de">Germany</option>
                    <option value="us">United States</option>
                </select>

                <label for="skills" style="margin-top:20px">Multi-select Skills:</label>
                <select id="skills" multiple size="4">
                    <option value="manual">Manual Testing</option>
                    <option value="automation">Automation Testing</option>
                    <option value="api">API Testing</option>
                    <option value="performance">Performance Testing</option>
                </select>
            </div>

            <div class="section">
                <h2>5. Textarea</h2>
                <label for="comments">Comments / Bug Description:</label>
                <textarea id="comments" rows="5" placeholder="Опишіть знайдений баг..."></textarea>
            </div>

            <div class="section">
                <h2>6. Кнопки різних типів</h2>
                <button type="button" class="btn-primary">Button (type=button)</button>
                <button type="submit" class="btn-success">Submit (type=submit)</button>
                <button type="reset" class="btn-danger">Reset Form</button>
                <input type="button" value="Input Button" style="padding:12px 24px; border-radius:8px;">
            </div>

            <div class="section">
                <h2>7. Спеціальні елементи</h2>
                <label for="date">Date Picker:</label>
                <input type="date" id="date">

                <label for="range" style="margin-top:20px">Range Slider (Volume / Priority):</label>
                <input type="range" id="range" min="0" max="100" value="65" style="width:100%;">
                <span id="rangeValue" style="font-weight:bold;">65</span>

                <label for="color" style="margin-top:20px">Color Picker:</label>
                <input type="color" id="color" value="#4c51bf">

                <label for="file" style="margin-top:20px">File Upload:</label>
                <input type="file" id="file">
            </div>

        </div>

        <div class="footer">
            <strong>QA Form Elements Handbook</strong> — створено для тестувальників • 2026
        </div>
    </div>

    <script>
        // Показ значення слайдера
        const range = document.getElementById('range');
        const rangeValue = document.getElementById('rangeValue');
        
        range.addEventListener('input', () => {
            rangeValue.textContent = range.value;
        });
    </script>

</body>
</html>
